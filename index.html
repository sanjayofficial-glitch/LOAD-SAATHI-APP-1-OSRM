<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="theme-color" content="#ea580c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LoadSaathi" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Connect directly with truckers and shippers. Fill empty truck space, save on freight costs." />
    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://loadsaathi.app/" />
    <meta property="og:title" content="LoadSaathi - India's Truck Space Marketplace" />
    <meta property="og:description" content="Connect directly with truckers and shippers. Fill empty truck space, save on freight costs." />
    <meta property="og:image" content="https://loadsaathi.app/icons/icon.svg" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LoadSaathi - India's Truck Space Marketplace" />
    <meta name="twitter:description" content="Connect directly with truckers and shippers. Fill empty truck space, save on freight costs." />
    <meta name="twitter:image" content="https://loadsaathi.app/icons/icon.svg" />
    <title>LoadSaathi - India's Truck Space Marketplace</title>
    <script>
      window.addEventListener('error', function(e) {
        var root = document.getElementById('root');
        if (root && root.children.length === 0) {
          root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f9fafb;padding:24px;font-family:system-ui,sans-serif;"><div style="max-width:480px;background:white;padding:32px;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.12);text-align:center;"><div style="font-size:48px;margin-bottom:16px;">⚠️</div><h1 style="font-size:20px;font-weight:700;color:#dc2626;margin:0 0 8px;">Failed to Load App</h1><p style="color:#6b7280;font-size:14px;margin:0 0 16px;line-height:1.5;">' + (e.message || 'Unknown error') + '</p><button onclick="location.reload()" style="background:#ea580c;color:white;border:none;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">Reload Page</button></div></div>';
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
