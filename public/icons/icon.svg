<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Truck body -->
  <rect x="80" y="240" width="220" height="120" rx="12" fill="white"/>
  <!-- Truck cab -->
  <path d="M300 200 L380 200 Q400 200 400 220 L400 360 L300 360 Z" fill="white"/>
  <!-- Cab window -->
  <rect x="310" y="210" width="80" height="50" rx="6" fill="#ea580c" opacity="0.3"/>
  <!-- Wheels -->
  <circle cx="150" cy="370" r="30" fill="#1f2937"/>
  <circle cx="150" cy="370" r="15" fill="white"/>
  <circle cx="360" cy="370" r="30" fill="#1f2937"/>
  <circle cx="360" cy="370" r="15" fill="white"/>
  <!-- Road line -->
  <rect x="60" y="400" width="392" height="4" rx="2" fill="white" opacity="0.5"/>
  <!-- LS text -->
  <text x="256" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="white" text-anchor="middle">LS</text>
</svg>
