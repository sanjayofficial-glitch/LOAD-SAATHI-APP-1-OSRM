<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- White rounded background -->
  <rect width="512" height="512" rx="80" fill="#ffffff"/>

  <!-- Speed lines (orange) -->
  <rect x="30" y="190" width="95" height="18" rx="9" fill="#E8541A"/>
  <rect x="45" y="222" width="75" height="14" rx="7" fill="#E8541A"/>
  <rect x="55" y="250" width="60" height="14" rx="7" fill="#E8541A"/>
  <rect x="65" y="278" width="50" height="14" rx="7" fill="#E8541A"/>
  <rect x="72" y="305" width="42" height="14" rx="7" fill="#E8541A"/>

  <!-- Orange cargo (puzzle left piece) -->
  <rect x="130" y="158" width="145" height="165" rx="14" fill="#E8541A"/>

  <!-- Puzzle connector notch on orange piece (cut out on right side) -->
  <circle cx="275" cy="240" r="26" fill="#ffffff"/>

  <!-- Blue cargo (puzzle right piece) -->
  <rect x="271" y="158" width="145" height="165" rx="14" fill="#3A7CA5"/>

  <!-- Puzzle connector notch on blue piece (cut out on left side) -->
  <circle cx="271" cy="240" r="26" fill="#ffffff"/>
  <!-- Overlap fill to make it look like one connected piece -->
  <rect x="271" y="214" width="26" height="52" fill="#3A7CA5"/>

  <!-- Dark navy truck cab -->
  <path d="M416 202 L468 202 Q490 202 490 224 L490 340 L416 340 Z" fill="#2D3E50"/>
  <!-- Cab window -->
  <path d="M422 212 L460 212 Q476 212 476 228 L476 280 L422 280 Z" fill="#4a6b8a" opacity="0.6"/>

  <!-- Truck body base (dark) -->
  <rect x="115" y="323" width="375" height="20" rx="4" fill="#2D3E50"/>

  <!-- Rear wheel -->
  <circle cx="190" cy="368" r="44" fill="#2D3E50"/>
  <circle cx="190" cy="368" r="22" fill="#9ab0c4"/>

  <!-- Front wheel -->
  <circle cx="435" cy="368" r="44" fill="#2D3E50"/>
  <circle cx="435" cy="368" r="22" fill="#9ab0c4"/>

  <!-- Wheel speed lines (dark) -->
  <rect x="25" y="335" width="88" height="10" rx="5" fill="#2D3E50"/>
  <rect x="15" y="350" width="100" height="10" rx="5" fill="#2D3E50"/>
  <rect x="20" y="365" width="92" height="10" rx="5" fill="#2D3E50"/>
</svg>
