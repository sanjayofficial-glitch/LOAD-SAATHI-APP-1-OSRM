  - id: supabase-client-dual
    type: architecture
    description: Two Supabase client files exist intentionally
    details: >
      src/utils/supabaseClient.ts has createClerkSupabaseClient() for authenticated requests.
      src/lib/supabaseClient.ts has anonymous client for Realtime subscriptions (NotificationBell.tsx, utils/chat.ts, Chat.tsx).
      Do NOT merge — anonymous client is needed for Realtime.
    status: active

  - id: route-map-osrm
    type: architecture
    description: RouteMap uses OSRM road geometry
    details: >
      RouteMap.tsx accepts pre-stored coordinate props to skip Nominatim geocoding.
      OSRM getRoute() only called when no pre-stored coords are provided (avoids API calls on display-only loads).
      Shows distance/ETA below map via GeoJSON.
    status: active

  - id: match-scoring
    type: feature
    description: Match scoring on browse pages
    details: >
      BrowseTrips and BrowseShipments sort results by match score descending.
      calculateMatchScore() in matching.ts compares origin/destination city overlap + weight capacity.
      Badges show match percentage (green >60, yellow 30-60, gray <30).
    status: active

  - id: coordinate-saving
    type: feature
    description: Coordinates saved on trip/shipment creation
    details: >
      PostTrip.tsx and PostShipments.tsx geocode origin/destination via Nominatim,
      get OSRM route for distance/duration, then update the DB row with lat/lng/est_distance/est_duration.
    status: active

  - id: whatsapp-integration
    type: feature
    description: WhatsApp deep links on trip/shipment detail pages
    details: >
      generateWhatsAppLink() in whatsapp.ts creates wa.me deep links.
      ShipmentDetail shows green WhatsApp button when accepted trucker has a phone.
      TripDetail shows WhatsApp button when trip has trucker contact.
    status: active

  - id: gemini-not-dead
    type: architecture
    description: src/lib/gemini.ts IS in use (not dead code)
    details: Imported by BrowseShipments.tsx for AI-powered shipment search. Do not delete.
    status: active

